<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- Background Glow -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9100" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0" />
    </radialGradient>
    <!-- Amber gradient -->
    <linearGradient id="neonOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9100" />
      <stop offset="100%" stop-color="#ff3d00" />
    </linearGradient>
    <!-- Body -->
    <linearGradient id="bodyDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c2825" />
      <stop offset="50%" stop-color="#1c1a18" />
      <stop offset="100%" stop-color="#0f0e0d" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="400" height="300" fill="#0d0d0d" rx="16" />
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="50" x2="400" y2="50" /><line x1="0" y1="100" x2="400" y2="100" />
    <line x1="0" y1="150" x2="400" y2="150" /><line x1="0" y1="200" x2="400" y2="200" />
    <line x1="0" y1="250" x2="400" y2="250" />
    <line x1="50" y1="0" x2="50" y2="300" /><line x1="100" y1="0" x2="100" y2="300" />
    <line x1="150" y1="0" x2="150" y2="300" /><line x1="200" y1="0" x2="200" y2="300" />
    <line x1="250" y1="0" x2="250" y2="300" /><line x1="300" y1="0" x2="300" y2="300" />
    <line x1="350" y1="0" x2="350" y2="300" />
  </g>
  
  <rect width="400" height="300" fill="url(#bgGlow)" rx="16" />
  
  <!-- Shadows -->
  <ellipse cx="200" cy="245" rx="110" ry="12" fill="#000" opacity="0.6" filter="blur(5px)" />
  <ellipse cx="200" cy="245" rx="70" ry="6" fill="#ff9100" opacity="0.15" filter="blur(8px)" />

  <g transform="translate(45, 30)">
    <!-- Rugged Boot Sole (thick blocks) -->
    <path d="M 30,175 Q 95,190 145,188 T 260,178 L 265,158 Q 240,168 145,170 T 35,160 Z" fill="#151312" stroke="#2c2825" stroke-width="1" />
    <path d="M 25,170 Q 95,187 145,185 T 262,172" fill="none" stroke="url(#neonOrange)" stroke-width="2.5" filter="url(#glow)" />
    
    <!-- Heavy Sole Grooves -->
    <path d="M 40,178 L 40,188 M 70,181 L 70,191 M 100,183 L 100,193 M 130,184 L 130,194 M 170,182 L 170,192 M 200,180 L 200,190" stroke="#000" stroke-width="4" />

    <!-- Heavy-Duty Boot Body -->
    <path d="M 35,160 Q 25,75 55,50 Q 80,48 95,75 Q 110,95 160,105 T 260,150 Q 255,168 235,168 Z" fill="url(#bodyDark)" stroke="#3e3935" stroke-width="1" />
    
    <!-- Ankle Support Collar / Buckle -->
    <path d="M 45,100 Q 30,75 50,60 T 75,80" fill="none" stroke="url(#neonOrange)" stroke-width="2" filter="url(#glow)" />
    <rect x="52" y="70" width="22" height="6" fill="#ff9100" rx="2" transform="rotate(15, 52, 70)" />
    <rect x="50" y="90" width="22" height="6" fill="#ff9100" rx="2" transform="rotate(15, 50, 90)" />

    <!-- Protective Toe Cap -->
    <path d="M 220,135 Q 245,138 260,150 L 255,158 Q 235,158 215,145 Z" fill="#111" />
    <path d="M 215,140 Q 240,143 258,150" fill="none" stroke="#ff9100" stroke-width="1.5" />
    
    <!-- Side vents / reinforcement cage -->
    <path d="M 90,120 L 140,115 L 170,140 L 110,145 Z" fill="#222" stroke="#333" stroke-width="1" />
    <path d="M 95,123 L 135,119 L 160,140 L 110,143 Z" fill="none" stroke="url(#neonOrange)" stroke-width="1" stroke-opacity="0.8" />
  </g>
  
  <text x="30" y="275" font-family="'Courier New', monospace" font-size="10" fill="#666">SYS: KINETIC // TERRA-04</text>
  <text x="320" y="275" font-family="'Courier New', monospace" font-size="10" fill="#ff9100" filter="url(#glow)">LATERAL.V1</text>
</svg>
