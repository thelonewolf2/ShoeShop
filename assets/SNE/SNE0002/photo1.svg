<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- Background Glow -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d500f9" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0" />
    </radialGradient>
    <!-- Purple neon gradient -->
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d500f9" />
      <stop offset="100%" stop-color="#ff1744" />
    </linearGradient>
    <!-- Body -->
    <linearGradient id="bodyDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1c3a" />
      <stop offset="50%" stop-color="#16101c" />
      <stop offset="100%" stop-color="#0b080f" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="400" height="300" fill="#0d0d0d" rx="16" />
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="50" x2="400" y2="50" /><line x1="0" y1="100" x2="400" y2="100" />
    <line x1="0" y1="150" x2="400" y2="150" /><line x1="0" y1="200" x2="400" y2="200" />
    <line x1="0" y1="250" x2="400" y2="250" />
    <line x1="50" y1="0" x2="50" y2="300" /><line x1="100" y1="0" x2="100" y2="300" />
    <line x1="150" y1="0" x2="150" y2="300" /><line x1="200" y1="0" x2="200" y2="300" />
    <line x1="250" y1="0" x2="250" y2="300" /><line x1="300" y1="0" x2="300" y2="300" />
    <line x1="350" y1="0" x2="350" y2="300" />
  </g>
  
  <rect width="400" height="300" fill="url(#bgGlow)" rx="16" />
  
  <!-- Shadows -->
  <ellipse cx="200" cy="245" rx="110" ry="12" fill="#000" opacity="0.6" filter="blur(5px)" />
  <ellipse cx="200" cy="245" rx="70" ry="6" fill="#d500f9" opacity="0.15" filter="blur(8px)" />

  <g transform="translate(45, 30)">
    <!-- Sole (chunkier fashion sole) -->
    <path d="M 35,180 Q 95,195 145,190 T 260,180 L 265,160 Q 250,175 145,180 T 35,170 Z" fill="#15121a" stroke="#2a1f33" stroke-width="1" />
    <path d="M 30,175 Q 95,192 145,187 T 262,174" fill="none" stroke="url(#neonPurple)" stroke-width="2.5" filter="url(#glow)" />
    
    <!-- Chunky platform details -->
    <path d="M 50,183 L 70,192 L 65,194 L 45,185 Z" fill="#1a1524" />
    <path d="M 100,185 L 120,194 L 115,196 L 95,187 Z" fill="#1a1524" />
    <path d="M 160,184 L 180,192 L 175,194 L 155,186 Z" fill="#1a1524" />

    <!-- Main High-Top Body -->
    <path d="M 35,170 Q 25,90 60,65 Q 90,65 110,85 Q 130,95 180,105 T 260,160 Q 255,175 235,175 Z" fill="url(#bodyDark)" stroke="#2d1c3a" stroke-width="1" />
    
    <!-- Ankle Protection Panel -->
    <path d="M 45,120 Q 35,90 55,75 T 80,95 Q 70,120 45,120" fill="none" stroke="url(#neonPurple)" stroke-width="2" filter="url(#glow)" />
    <circle cx="60" cy="95" r="8" fill="#111" stroke="#333" stroke-width="1" />
    <circle cx="60" cy="95" r="3" fill="#ff1744" />
    
    <!-- Swoosh or dynamic stripe -->
    <path d="M 90,140 Q 155,120 230,145" fill="none" stroke="url(#neonPurple)" stroke-width="4.5" filter="url(#glow)" />
    
    <!-- Lacing / Strap -->
    <path d="M 90,65 Q 110,80 120,110 L 105,115 Q 95,85 80,70 Z" fill="#181320" />
    <line x1="90" y1="80" x2="115" y2="90" stroke="url(#neonPurple)" stroke-width="2" />
    <line x1="85" y1="95" x2="110" y2="105" stroke="url(#neonPurple)" stroke-width="2" />
    <line x1="80" y1="110" x2="105" y2="120" stroke="url(#neonPurple)" stroke-width="2" />
  </g>
  
  <text x="30" y="275" font-family="'Courier New', monospace" font-size="10" fill="#666">SYS: KINETIC // NEBULA-02</text>
  <text x="320" y="275" font-family="'Courier New', monospace" font-size="10" fill="#d500f9" filter="url(#glow)">LATERAL.V1</text>
</svg>
