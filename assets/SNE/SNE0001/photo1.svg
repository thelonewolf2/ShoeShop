<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- Background Glow -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0" />
    </radialGradient>
    <!-- Cyan neon gradient for shoe details -->
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" />
      <stop offset="100%" stop-color="#00838f" />
    </linearGradient>
    <!-- Dark shoe body gradient -->
    <linearGradient id="bodyDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a" />
      <stop offset="50%" stop-color="#1a1a1a" />
      <stop offset="100%" stop-color="#0f0f0f" />
    </linearGradient>
    <!-- Carbon Sole Gradient -->
    <linearGradient id="soleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#111" />
      <stop offset="50%" stop-color="#333" />
      <stop offset="100%" stop-color="#111" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Canvas Background -->
  <rect width="400" height="300" fill="#0d0d0d" rx="16" />
  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="50" x2="400" y2="50" />
    <line x1="0" y1="100" x2="400" y2="100" />
    <line x1="0" y1="150" x2="400" y2="150" />
    <line x1="0" y1="200" x2="400" y2="200" />
    <line x1="0" y1="250" x2="400" y2="250" />
    <line x1="50" y1="0" x2="50" y2="300" />
    <line x1="100" y1="0" x2="100" y2="300" />
    <line x1="150" y1="0" x2="150" y2="300" />
    <line x1="200" y1="0" x2="200" y2="300" />
    <line x1="250" y1="0" x2="250" y2="300" />
    <line x1="300" y1="0" x2="300" y2="300" />
    <line x1="350" y1="0" x2="350" y2="300" />
  </g>
  
  <rect width="400" height="300" fill="url(#bgGlow)" rx="16" />
  
  <!-- Ambient Shadow -->
  <ellipse cx="200" cy="245" rx="110" ry="12" fill="#000" opacity="0.6" filter="blur(5px)" />
  <ellipse cx="200" cy="245" rx="70" ry="6" fill="#00e5ff" opacity="0.25" filter="blur(8px)" />

  <!-- Shoe Group -->
  <g transform="translate(45, 45)">
    <!-- Sole / Cushioning Midsole -->
    <path d="M 40,165 Q 90,175 140,170 T 255,160 Q 275,145 285,130 L 290,140 Q 275,165 240,175 T 100,180 Q 50,180 20,170 Z" fill="url(#soleGrad)" />
    <!-- Carbon fiber plate line -->
    <path d="M 30,168 Q 90,177 140,172 T 260,158" fill="none" stroke="url(#neonCyan)" stroke-width="3" filter="url(#glow)" />
    
    <!-- Outsole bottom grip -->
    <path d="M 22,171 Q 50,182 100,182 T 240,177 Q 265,170 282,150" fill="none" stroke="#222" stroke-width="4" />
    
    <!-- Main Shoe Body -->
    <path d="M 40,165 Q 30,120 70,100 T 170,90 Q 200,60 230,85 Q 265,110 285,130 Q 275,145 255,160 Z" fill="url(#bodyDark)" stroke="#333" stroke-width="1" />
    
    <!-- Back Collar & Heel Counter -->
    <path d="M 40,165 Q 28,125 45,105 Q 65,95 75,115 Q 65,145 75,165" fill="#151515" />
    <path d="M 30,130 Q 25,110 38,105 T 50,125" fill="none" stroke="url(#neonCyan)" stroke-width="2" filter="url(#glow)" />
    
    <!-- Side Panels & Tech Cage (Cyberpunk Aesthetics) -->
    <path d="M 90,110 L 140,115 L 170,145 L 110,155 Z" fill="#222222" stroke="#444" stroke-width="1" />
    <path d="M 95,115 L 135,120 L 160,145 L 110,150 Z" fill="none" stroke="url(#neonCyan)" stroke-width="1.5" stroke-opacity="0.8" />
    
    <!-- Front Toe Guard -->
    <path d="M 255,160 Q 275,145 285,130 Q 280,125 270,130 Q 255,145 245,155 Z" fill="#111" />
    
    <!-- Lacing System & Tongue -->
    <path d="M 170,90 C 175,95 190,105 195,120 L 180,125 C 175,115 165,100 160,95 Z" fill="#1e1e1e" />
    <!-- Glowing Laces -->
    <line x1="172" y1="95" x2="190" y2="105" stroke="url(#neonCyan)" stroke-width="2" />
    <line x1="168" y1="105" x2="185" y2="115" stroke="url(#neonCyan)" stroke-width="2" />
    <line x1="164" y1="115" x2="180" y2="125" stroke="url(#neonCyan)" stroke-width="2" />
    
    <!-- Dynamic Swoosh / Wave Line -->
    <path d="M 85,140 Q 150,130 200,100 T 265,125" fill="none" stroke="url(#neonCyan)" stroke-width="4" filter="url(#glow)" />
  </g>
  
  <!-- Technical Labels -->
  <text x="30" y="275" font-family="'Courier New', monospace" font-size="10" fill="#666">SYS: KINETIC // PHANTOM-01</text>
  <text x="320" y="275" font-family="'Courier New', monospace" font-size="10" fill="#00e5ff" filter="url(#glow)">LATERAL.V1</text>
</svg>
