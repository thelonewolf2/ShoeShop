<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" />
      <stop offset="100%" stop-color="#00838f" />
    </linearGradient>
    <linearGradient id="bodyDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a" />
      <stop offset="50%" stop-color="#1a1a1a" />
      <stop offset="100%" stop-color="#0f0f0f" />
    </linearGradient>
    <linearGradient id="soleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#111" />
      <stop offset="50%" stop-color="#333" />
      <stop offset="100%" stop-color="#111" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="400" height="300" fill="#0d0d0d" rx="16" />
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="50" x2="400" y2="50" /><line x1="0" y1="100" x2="400" y2="100" />
    <line x1="0" y1="150" x2="400" y2="150" /><line x1="0" y1="200" x2="400" y2="200" />
    <line x1="0" y1="250" x2="400" y2="250" />
    <line x1="50" y1="0" x2="50" y2="300" /><line x1="100" y1="0" x2="100" y2="300" />
    <line x1="150" y1="0" x2="150" y2="300" /><line x1="200" y1="0" x2="200" y2="300" />
    <line x1="250" y1="0" x2="250" y2="300" /><line x1="300" y1="0" x2="300" y2="300" />
    <line x1="350" y1="0" x2="350" y2="300" />
  </g>
  
  <rect width="400" height="300" fill="url(#bgGlow)" rx="16" />
  
  <!-- Shadow -->
  <ellipse cx="200" cy="245" rx="90" ry="12" fill="#000" opacity="0.6" filter="blur(5px)" />
  <ellipse cx="200" cy="245" rx="60" ry="6" fill="#00e5ff" opacity="0.2" filter="blur(8px)" />

  <!-- Shoe Group (Perspective Rear-Quarter View) -->
  <g transform="translate(70, 45) scale(0.95)">
    <!-- Sole -->
    <path d="M 40,170 Q 110,185 180,180 T 260,155 L 265,145 Q 180,170 110,170 T 35,155 Z" fill="url(#soleGrad)" />
    <path d="M 35,160 Q 110,175 180,175 T 260,150" fill="none" stroke="url(#neonCyan)" stroke-width="2.5" filter="url(#glow)" />
    
    <!-- Body -->
    <path d="M 40,170 Q 30,100 70,80 Q 110,65 140,85 Q 170,120 260,150 L 260,155 Q 180,170 40,170 Z" fill="url(#bodyDark)" stroke="#333" stroke-width="1" />
    
    <!-- Heel Collar & Detailed Counter (emphasized in rear view) -->
    <path d="M 40,170 Q 25,120 35,95 Q 55,90 65,115 Q 50,145 55,170" fill="#181818" />
    <!-- Rear pull tab -->
    <path d="M 30,95 Q 20,80 32,75 T 42,90" fill="none" stroke="url(#neonCyan)" stroke-width="3" filter="url(#glow)" />
    
    <!-- Tech details side -->
    <path d="M 80,110 L 130,110 L 160,135 L 100,145 Z" fill="#222" stroke="#444" stroke-width="1" />
    <path d="M 85,115 L 125,115 L 150,135 L 100,140 Z" fill="none" stroke="url(#neonCyan)" stroke-width="1" stroke-opacity="0.8" />
    
    <!-- Front toe curve -->
    <path d="M 230,140 Q 250,145 260,150 Q 255,155 240,152 Z" fill="#111" />
  </g>
  
  <text x="30" y="275" font-family="'Courier New', monospace" font-size="10" fill="#666">SYS: KINETIC // PHANTOM-01</text>
  <text x="320" y="275" font-family="'Courier New', monospace" font-size="10" fill="#00e5ff" filter="url(#glow)">REAR.V2</text>
</svg>
